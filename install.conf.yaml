- defaults:
    link:
      create: true
      relink: true
      force: true

- clean: ['~']

- link:
    ~/.bashrc: .bashrc
    ~/.gitconfig: .gitconfig
    ~/.profile: .profile
    ~/.tmux.conf: .tmux.conf
    ~/.zshrc: .zshrc
    ~/.p10k.zsh: .p10k.zsh
    ~/.nanorc: .nanorc
    ~/.editorconfig: .editorconfig
    ~/.bash_aliases: .bash_aliases

- shell:
  - [git submodule update --init --recursive, Installing submodules]